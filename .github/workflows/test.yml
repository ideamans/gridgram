name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync bundled data (tabler icons + licenses)
        run: |
          bun run sync-tabler
          bun run sync-licenses

      # Regenerates icon-index / llm-reference / llms.txt from the SSOT.
      # sync-tabler already runs the first two; we run the full chain so
      # docs/public/llms*.txt is available for the test that exercises it.
      - name: Regenerate AI artifacts
        run: bun run ai:regen

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Bun 1.3.1+ regressed the module resolver in compiled binaries
          # so sharp's transitive deps (detect-libc, color, semver) fail
          # to load at runtime. 1.3.0 is the last known-good compile
          # target. Typecheck + tests don't strictly need 1.3.0, but we
          # keep the whole workflow on one version for reproducibility.
          bun-version: 1.3.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync bundled data (tabler icons + licenses)
        run: |
          bun run sync-tabler
          bun run sync-licenses

      # Regenerates icon-index / llm-reference / llms.txt from the SSOT.
      # sync-tabler already runs the first two; we run the full chain so
      # docs/public/llms*.txt is available for the test that exercises it.
      - name: Regenerate AI artifacts
        run: bun run ai:regen

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test

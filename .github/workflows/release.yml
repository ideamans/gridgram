name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - id: version
        name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG  tag_version=$TAG_VERSION  package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: verify-version
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: bun-linux-x64
            os: linux
            arch: amd64
            ext: tar.gz
          - target: bun-linux-arm64
            os: linux
            arch: arm64
            ext: tar.gz
          - target: bun-darwin-x64
            os: darwin
            arch: amd64
            ext: tar.gz
          - target: bun-darwin-arm64
            os: darwin
            arch: arm64
            ext: tar.gz
          - target: bun-windows-x64
            os: windows
            arch: amd64
            ext: zip
    # sharp/libvips is fetched at runtime by src/cli/sharp-loader.ts, so no
    # native toolchain is required on the build host — every target
    # cross-compiles from a single Linux runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync bundled data (tabler icons + licenses)
        shell: bash
        run: |
          bun run sync-tabler
          bun run sync-licenses

      - name: Compile binary
        shell: bash
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          TARGET: ${{ matrix.target }}
          OS: ${{ matrix.os }}
        run: |
          set -euo pipefail
          if [ "$OS" = "windows" ]; then
            BIN=gg.exe
          else
            BIN=gg
          fi
          bun build --compile --minify --sourcemap=external \
            --target="$TARGET" \
            --external sharp --external '@img/*' \
            src/cli/gg.ts \
            --outfile "$BIN"

      - name: Create archive
        id: archive
        shell: bash
        env:
          VERSION: ${{ needs.verify-version.outputs.version }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
          EXT: ${{ matrix.ext }}
        run: |
          set -euo pipefail
          NAME="gridgram_${VERSION}_${OS}_${ARCH}"
          mkdir -p "dist/$NAME"
          if [ "$OS" = "windows" ]; then
            mv gg.exe "dist/$NAME/"
          else
            mv gg "dist/$NAME/"
          fi
          [ -f THIRD_PARTY_LICENSES.md ] && cp THIRD_PARTY_LICENSES.md "dist/$NAME/" || true
          [ -f README.md ] && cp README.md "dist/$NAME/" || true
          cd dist
          if [ "$EXT" = "zip" ]; then
            zip -rq "${NAME}.${EXT}" "$NAME"
          else
            tar -czf "${NAME}.${EXT}" "$NAME"
          fi
          echo "archive=dist/${NAME}.${EXT}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.name }}
          path: ${{ steps.archive.outputs.archive }}
          if-no-files-found: error
          retention-days: 1

  release:
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and generate checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} dist/ \;
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt
          ls -la

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
